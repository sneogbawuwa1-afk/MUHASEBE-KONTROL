<!DOCTYPE html>
<html lang="tr" translate="no">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
<meta name="color-scheme" content="light" />
<meta name="theme-color" content="#0F1830" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="E-Fatura Panel" />
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>E-Fatura Mutabakat Paneli</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js" crossorigin="anonymous" defer onerror="window.__xlsxYuklenemedi=true;"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.14.1/firebase-app-compat.min.js" crossorigin="anonymous" defer onerror="window.__firebaseYuklenemedi=true;"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.14.1/firebase-database-compat.min.js" crossorigin="anonymous" defer onerror="window.__firebaseYuklenemedi=true;"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;1,700&display=swap" rel="stylesheet">
<link rel="preload" as="style" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" onload="this.onload=null;this.rel='stylesheet';">
<noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"></noscript>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="layout">

  <!-- ===== SIDEBAR: Veri paneli (menü değil) — daralınca ikon rayı, tıklayınca genişler ===== -->
  <aside class="sb" id="sidebar">
    <div class="sb-marka">
      <button type="button" class="sb-logo sb-rota-btn" id="btnSidebarToggleRail" aria-label="Paneli genişlet/daralt">
        <i class="fa-solid fa-file-invoice" aria-hidden="true"></i>
      </button>
      <div class="sb-marka-txt">
        <div class="sb-ad">E-Fatura Mutabakat</div>
        <div class="sb-alt">Keşan · Bayrampaşa</div>
      </div>
      <button type="button" class="sb-daralt" id="btnSidebarDaralt" aria-label="Paneli daralt"><i class="fa-solid fa-angles-left" aria-hidden="true"></i></button>
    </div>

    <div class="sb-govde">
      <div class="sb-bolum">Veri Kaynakları</div>
      <div id="uploadPanels"><!-- JS: renderUploadPanels --></div>

      <div class="sb-bolum">Ayarlar</div>
      <div class="sb-tolerans">
        <div class="l">Tolerans (₺)<small>altındaki farklar eşleşti sayılır</small></div>
        <input type="number" id="toleransInput" min="0" step="0.5" value="1" aria-label="Tutar toleransı">
      </div>

      <button type="button" class="sb-olustur" id="btnBuildReport" disabled title="Raporu Oluştur">
        <i class="fa-solid fa-bolt" aria-hidden="true"></i> <span class="sb-etiket">Raporu Oluştur</span>
      </button>
      <input type="file" id="raporIceAktarInput" accept=".json" style="display:none;">
      <div class="sb-aktarim">
        <button type="button" id="btnRaporIceAktar" title="Daha önce dışa aktarılan raporu yükle"><i class="fa-solid fa-file-import" aria-hidden="true"></i> <span class="sb-etiket">İçeri Aktar</span></button>
        <button type="button" id="btnRaporDisaAktar" title="Raporun tamamını tek dosya olarak indir"><i class="fa-solid fa-file-export" aria-hidden="true"></i> <span class="sb-etiket">Dışarı Aktar</span></button>
      </div>
    </div>

    <div class="sb-kullanici">
      <div class="sb-avatar">BC</div>
      <div class="sb-kullanici-txt"><div class="sb-kul-ad">Berat Can</div><div class="sb-kul-rol">Yönetici</div></div>
    </div>
  </aside>
  <div class="sb-overlay" id="sbOverlay"></div>

  <!-- ===== ANA ALAN ===== -->
  <main class="main">
    <div class="ust">
      <button type="button" class="ust-hamburger" id="btnSidebarAc" aria-label="Veri panelini aç"><i class="fa-solid fa-bars" aria-hidden="true"></i></button>
      <div>
        <h1 class="ust-baslik">E-Fatura Mutabakat Paneli</h1>
        <div class="ust-sub"><span class="ust-dot"></span> <span id="topbarSub">Henüz veri yüklenmedi</span></div>
      </div>
      <div class="ust-sag">
        <span id="bulutDurumRozeti" class="bulut-durum" title="Bulut bağlantısı durumu kontrol ediliyor…">
          <i class="fa-solid fa-cloud" aria-hidden="true"></i> Bağlanıyor…
        </span>
        <button type="button" class="btn-yukle" id="btnUygulamaYukle" title="Uygulamayı bilgisayarına veya telefonuna yükle" hidden>
          <i class="fa-solid fa-arrow-down-to-line" aria-hidden="true"></i> <span class="btn-yukle-txt">Yükle</span>
        </button>
        <button type="button" class="btn-yenile" id="btnRefreshArchive" title="Kayıtlı veriyi yeniden hesapla"><i class="fa-solid fa-rotate" aria-hidden="true"></i></button>
      </div>
    </div>

    <div class="content">
      <div id="yetimUyariKap"></div>
      <div id="donemPaneliKap"></div>
      <div class="kpis" id="kpiRow"></div>
      <div id="tutarOzetKap"></div>
      <div class="group-tabs" id="groupTabs"></div>
      <div id="groupSections"></div>
    </div>
  </main>

</div>

<script src="js/01-cekirdek.js"></script>
<script src="js/02-veri-yukleme.js"></script>
<script src="js/03-eslestirme.js"></script>
<script src="js/04-genel-bakis.js"></script>
<script src="js/07-donem-arsivi.js"></script>
<script src="js/08-senkron-katmani.js"></script>
<script src="js/09-firebase.js"></script>
<script src="js/10-netsis-birlestir.js"></script>
<script src="js/05-uygulama.js"></script>
<script src="js/06-pwa.js"></script>
<script>
  if('serviceWorker' in navigator){
    window.addEventListener('load', ()=>{
      navigator.serviceWorker.register('service-worker.js').catch(()=>{});
    });
  }
</script>
</body>
</html>
